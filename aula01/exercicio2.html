<!DOCTYPE html>
<html lang=“en”>

<head>
    <meta charset=“UTF-8”>
    <meta name=“viewport” content=“width=device-width, initial-scale=1.0”>
    <title>Document</title>
</head>

<body>
    <script>
        // lê os dados de entrada
        var vlrConta = Number(prompt("Informe o valor da Conta: "));
        var numClientes = Number(prompt("Informe o número de clientes: "));
        var vlrCliente = vlrConta/numClientes;
        // exibe os vizinhos
        alert("O valor da Conta R$ " + vlrConta.toFixed(2) +
         "\nNúmero de Clientes : "+numClientes + "\nValor por Cliente R$ " +
          vlrCliente.toFixed(2));
    </script>
</body>
