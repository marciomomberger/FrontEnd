<!DOCTYPE html>
<html lang=“en”>

<head>
    <meta charset=“UTF-8”>
    <meta name=“viewport” content=“width=device-width, initial-scale=1.0”>
    <title>Document</title>
</head>

<body>
    <script>
        // lê os dados de entrada
        var nota1= Number(prompt("Informe a 1ª nota : "));
        var nota2= Number(prompt("Informe a 2ª nota : "));
        //Calcular média
        var media = (nota1+nota2)/2;
        alert("A 1ª nota é " + nota1 +
         "\nA 2ª nota é "+nota2 +
          "\nA média é " + media);
    </script>
</body>
