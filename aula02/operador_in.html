<!DOCTYPE html>
<html>

<head>
  <meta charset=“UTF-8”>
  <meta name=“viewport” content=“width=device-width, initial-scale=1.0”>
  <title>Document</title>
</head>

<body>
  <script>
    var data = [7, 8, 9]; // Um array com elementos 0, 1 e 2
    alert("0" in data); // => verdadeiro: o array tem um elemento "0" que é o 7
    alert(1 in data); // => verdadeiro: números são convertidos em strings é o 8
    alert(3 in data); // => falso: nenhum elemento 3, pois termina na posição 2

  </script>

</body>

</html>
