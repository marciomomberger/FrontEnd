<!DOCTYPE html>
<html>

<head>
  <meta charset=“UTF-8”>
  <meta name=“viewport” content=“width=device-width, initial-scale=1.0”>
  <title>Document</title>
</head>

<body>
  <script>
    var a = 5; 
    var b = ++a; // a é 6, b é 6 (incremento prefixado)
    alert("a : "+a);
    alert("b : "+b);
    var x = 5; 
    var y = x++; // x é 6, y é 5 (incremento posfixado)
    alert("x : "+x);
    alert("y :" +y)


  </script>

</body>

</html>
