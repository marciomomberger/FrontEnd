<html>

<head>

  <title>Document</title>
</head>

<body>
  <script>
    // lê um dado de entrada
    var num1 = Number(prompt("Digite 1 Número: "));
    var num2 = Number(prompt("Digite outro Número: "));
        // operador de maior ou igual que
    alert("O numero 1 ("+ num1+") é  maior ou igual que o numero 2 ("+
    num2+") : "+  (num1>=num2) );
    </script>

</body>
