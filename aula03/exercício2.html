<!DOCTYPE html>
<html>

<head>
  <meta charset=“UTF-8”>
  <meta name=“viewport” content=“width=device-width, initial-scale=1.0”>
  <title>Document</title>
</head>

<body>
  <script>
    let numero = parseInt(prompt("Digite um número inteiro:"));
    if (numero % 2 === 0) {
      alert("O numero "+numero+ " é Par");
    } else {
      alert("O numero "+numero+ " é Impar");
    }
  </script>
</body>

</html>
