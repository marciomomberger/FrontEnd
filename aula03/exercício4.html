  <title>Document</title>

<body>
  <script>
    let a = parseFloat(prompt("Digite o primeiro número:"));
    let b = parseFloat(prompt("Digite o segundo número:"));
    let c = parseFloat(prompt("Digite o terceiro número:"));
    if (a > b) {
      if (a > c) {
        alert("O maior é o primeiro número:"+ a);
      } else {
        alert("O maior é o terceiro número:"+ c);
      }
    } else {
      if (b > c) {
        alert("O maior é o segundo número::"+ b);
      } else {
        alert("O maior é o terceiro número:"+ c);
      }
    }
    </script>
