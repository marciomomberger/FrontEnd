<!DOCTYPE html>
<html>

<head>
  <meta charset=“UTF-8”>
  <meta name=“viewport” content=“width=device-width, initial-scale=1.0”>
  <title>Document</title>
</head>

<body>
  <script>
    let numero;
    do {
      numero = prompt("Digite um numero de 1 a 10 :");
    } while (numero < 1 || numero > 10);
    alert("Você digitou o número " + numero);
  </script>

</body>

</html>
