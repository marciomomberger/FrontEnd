<!DOCTYPE html>
<html>

<head>
  <meta charset=“UTF-8”>
  <meta name=“viewport” content=“width=device-width, initial-scale=1.0”>
  <title>Document</title>
</head>

<body>
  <script>
    // Ler o número de maçãs (exemplo usando prompt)
    let quantidade = parseInt(prompt("Digite o número de maçãs compradas:"));
    let preco;
    // Verifica o preço unitário
    if (quantidade < 12) {
      preco = 1.30;
    } else {
      preco = 1.00;
    }
    // Calcula o custo total
    let total = quantidade * preco;
    // Exibe o resultado
    alert("São "+ quantidade+ " maçãs a R$"+preco.toFixed(2)+" cada e o custo total da compra é: R$ " + total.toFixed(2));
  </script>

</body>

</html>
