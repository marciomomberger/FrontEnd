<!DOCTYPE html>
<html>

<head>
  <meta charset=“UTF-8”>
  <meta name=“viewport” content=“width=device-width, initial-scale=1.0”>
  <title>Document</title>
</head>

<body>
  <script>
    // Mostrar a tabuada
    for (let i = 1; i <= 10; i++) {
      document.write("<h1>A tabuada do " + i + "</h1>"); //.h3 header -titulo tamanho 3
      for (let j = 1; j <= 10; j++) {
        document.write(i + " X " + j + " = " + (i * j) + "<br>"); //  break row - quebra de linha
      }
    }
  </script>

</body>

</html>
