<!DOCTYPE html>
<html>

<head>
  <meta charset=“UTF-8”>
  <meta name=“viewport” content=“width=device-width, initial-scale=1.0”>
  <title>Document</title>
</head>

<body>
  <script>
    // Mostrar a tabuada
    let numero = Number(prompt("Digite o numero da tabuada a ser gerado"));
      document.write("<h3>A tabuada do " + numero + "</h3>"); //.h3 header -titulo tamanho 3
      for (let j = 1; j <= 10; j++) {
        document.write(numero + " X " + j + " = " + (numero * j) + "<br>"); //  break row - quebra de linha
    }
  </script>

</body>

</html>
