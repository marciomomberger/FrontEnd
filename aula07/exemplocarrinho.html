<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Produtos</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }
        input {
            margin: 5px;
            padding: 5px;
        }
        button {
            margin-top: 10px;
            padding: 8px 15px;
            cursor: pointer;
        }
        table {
            margin: 20px auto;
            border-collapse: collapse;
        }
        th, td {
            border: 2px solid black;
            padding: 8px;
        }
    </style>
</head>
<body>

<h2>Cadastro de Produtos</h2>

<input type="text" id="nome" placeholder="Nome do produto">
<input type="number" id="preco" placeholder="Preço">
<input type="number" id="quantidade" placeholder="Quantidade">
<br>
<button onclick="adicionarProduto()">Adicionar Produto</button>
<button onclick="mostrarProdutos()">Mostrar Lista</button>

<h3>Lista de Produtos</h3>
<table id="tabela">
    <tr>
        <th>Nome</th>
        <th>Preço</th>
        <th>Quantidade</th>
        <th>Total</th>
    </tr>
</table>

<h3 id="total"></h3>

<script>
    let nomes = [];
    let precos = [];
    let quantidades = [];
    let totais = [];

    function adicionarProduto() {
        let nome = document.getElementById("nome").value;
        let preco = parseFloat(document.getElementById("preco").value);
        let quantidade = parseInt(document.getElementById("quantidade").value);

        nomes.push(nome);
        precos.push(preco);
        quantidades.push(quantidade);
        totais.push(preco * quantidade);

        // Limpar campos
        document.getElementById("nome").value = "";
        document.getElementById("preco").value = "";
        document.getElementById("quantidade").value = "";

        alert("Produto adicionado!");
    }

    function mostrarProdutos() {
        let tabela = document.getElementById("tabela");

        // Limpa a tabela (mantém o cabeçalho)
        tabela.innerHTML = `
            <tr>
                <th>Nome</th>
                <th>Preço</th>
                <th>Quantidade</th>
                <th>Total</th>
            </tr>
        `;

        let totalCompra = 0;

        for (let i = 0; i < nomes.length; i++) {
            let linha = `
                <tr>
                    <td>${nomes[i]}</td>
                    <td>R$ ${precos[i].toFixed(2)}</td>
                    <td>${quantidades[i]}</td>
                    <td>R$ ${totais[i].toFixed(2)}</td>
                </tr>
            `;
            tabela.innerHTML += linha;

            totalCompra += totais[i];
        }

        document.getElementById("total").innerText =
            "Total da compra: R$ " + totalCompra.toFixed(2);
    }
</script>

</body>
</html>
