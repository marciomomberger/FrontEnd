<!DOCTYPE html>
<html>
<head>
    <title>Exemplo Hover</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f0f0f0;
            text-align: center;
        }

        h1 {
            color: #333;
        }

        /* Botão */
        .botao {
            background-color: green;
            color: white;
            padding: 15px 30px;
            border: none;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }

        /* Efeito hover no botão */
        .botao:hover {
            background-color: darkgreen;
            transform: scale(1.1);
        }

        /* Caixa */
        .caixa {
            background-color: white;
            width: 200px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 2px 2px 10px gray;
            transition: 0.3s;
        }

        /* Hover na caixa */
        .caixa:hover {
            background-color: lightblue;
            transform: translateY(-5px);
        }

        /* Link */
        a {
            text-decoration: none;
            color: blue;
            font-size: 18px;
            transition: 0.3s;
        }

        /* Hover no link */
        a:hover {
            color: red;
            text-decoration: underline;
        }

    </style>
</head>
<body>

    <h1>Exemplo de Hover</h1>

    <button class="botao">Clique aqui</button>

    <div class="caixa">
        Passe o mouse aqui
    </div>

    <p>
        <a href="#">Link com efeito</a>
    </p>

</body>
</html>
