<!DOCTYPE html>
<html>
<head>
    <style>
        p{
            font-size: 40px;
        }
        .serif {
            font-family: "Times New Roman", serif;
        }
        .sans {
            font-family: Arial, sans-serif;
        }
        .mono {
            font-family: "Courier New", monospace;
        }
        .cursive {
            font-family: "Brush Script MT", cursive;
        }
        .fantasy {
            font-family: Impact, fantasy;
        }
    </style>
</head>
<body>
    <p class="serif">Texto com fonte Serif</p>
    <p class="sans">Texto com fonte Sans-serif</p>
    <p class="mono">Texto com fonte Monospace</p>
    <p class="cursive">Texto com fonte Cursive</p>
    <p class="fantasy">Texto com fonte Fantasy</p>
</body>
</html>
