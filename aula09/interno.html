<!DOCTYPE html>
<html>
<head>
    <title>CSS Interno</title>

    <style>
        body {
            background-color: lightblue;
            font-family: Arial;
        }

        h1 {
            color: navy;
            text-align: center;
        }

        p {
            color: black;
            font-size: 18px;
        }

        .caixa {
            background-color: white;
            padding: 15px;
            border: 2px solid black;
            margin: 10px;
        }

        #destaque {
            color: red;
            font-weight: bold;
        }

        a {
            color: green;
            text-decoration: none;
        }
    </style>

</head>
<body>

<h1>Título Principal</h1>

<p>Parágrafo normal</p>

<p id="destaque">Parágrafo em destaque</p>

<div class="caixa">
    Conteúdo dentro da caixa
</div>

<a href="#">Clique aqui</a>

</body>
</html>
