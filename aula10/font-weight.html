<!DOCTYPE html>
<html>
<head>
    <title>Exemplo font-weight</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }

        .container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
        }

        /* Valores básicos */
        .normal {
            font-weight: normal;
        }

        .bold {
            font-weight: bold;
        }

        .lighter {
            font-weight: lighter;
        }
        /* Valores numéricos */
        .w100 { font-weight: 100; }
        .w200 { font-weight: 200; }
        .w300 { font-weight: 300; }
        .w400 { font-weight: 400; } /* normal */
        .w500 { font-weight: 500; }
        .w600 { font-weight: 600; }
        .w700 { font-weight: 700; } /* bold */
        .w800 { font-weight: 800; }
        .w900 { font-weight: 900; }
        /* Comparação visual */
        p {
            margin: 8px 0;
        }

    </style>
</head>
<body>
<div class="container">
    <h1>Exemplos de font-weight</h1>
    <h2>Valores básicos</h2>
    <p class="normal">Texto com font-weight: normal</p>
    <p class="bold">Texto com font-weight: bold</p>
    <p class="lighter">Texto com font-weight: lighter</p>
    <h2>Valores numéricos</h2>
    <p class="w100">Peso 100 (muito fino)</p>
    <p class="w200">Peso 200</p>
    <p class="w300">Peso 300 (leve)</p>
    <p class="w400">Peso 400 (normal)</p>
    <p class="w500">Peso 500</p>
    <p class="w600">Peso 600</p>
    <p class="w700">Peso 700 (negrito)</p>
    <p class="w800">Peso 800</p>
    <p class="w900">Peso 900 (muito grosso)</p>
</div>
</body>
</html>
