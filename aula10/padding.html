<!DOCTYPE html>
<html>
<head>
    <title>Exemplos de Padding</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <style>
        body {
            font-family: Arial;
            background-color: #f0f0f0;
            padding: 20px;
        }

        h2 {
            margin-top: 30px;
        }

        .container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
        }

        /* 1 - Todos os lados iguais */
        .box1 {
            padding: 20px;
            background-color: lightblue;
        }

        /* 2 - Vertical / Horizontal */
        .box2 {
            padding: 10px 30px;
            background-color: lightgreen;
        }

        /* 3 - 4 valores */
        .box3 {
            padding: 10px 20px 30px 40px;
            background-color: lightcoral;
        }

        /* 4 - Individual */
        .box4 {
            padding-top: 20px;
            padding-right: 10px;
            padding-bottom: 5px;
            padding-left: 30px;
            background-color: lightyellow;
        }

        /* 5 - Botão */
        .btn {
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        /* 6 - Card */
        .card {
            padding: 20px;
            background-color: #ddd;
            border-radius: 10px;
        }

        /* 7 - Porcentagem */
        .box5 {
            padding: 10%;
            background-color: lightgray;
        }

        /* 8 - Box sizing */
        .box6 {
            width: 200px;
            padding: 20px;
            border: 5px solid black;
            background-color: #eee;
            box-sizing: border-box;
        }

        .box {
            margin: 10px 0;
        }

    </style>
</head>
<body>

<div class="container">

    <h1>Exemplos de Padding</h1>

    <h2>1. Padding igual</h2>
    <div class="box box1">Padding: 20px</div>

    <h2>2. Vertical / Horizontal</h2>
    <div class="box box2">Padding: 10px 30px</div>

    <h2>3. Quatro lados</h2>
    <div class="box box3">Padding: 10px 20px 30px 40px</div>

    <h2>4. Individual</h2>
    <div class="box box4">Padding por lado</div>

    <h2>5. Botão</h2>
    <button class="btn">Clique aqui</button>

    <h2>6. Card</h2>
    <div class="card">Conteúdo com padding</div>

    <h2>7. Porcentagem</h2>
    <div class="box box5">Padding: 10%</div>

    <h2>8. Box-sizing</h2>
    <div class="box box6">Com box-sizing</div>

</div>

</body>
</html>
