<!DOCTYPE html>
<html>

<head>
    <title>Exemplos de Box Shadow</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <style>
        body {
            font-family: Arial;
            background-color: #f0f0f0;
            padding: 20px;
        }

        .container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
        }

        h2 {
            margin-top: 30px;
        }

        .box {
            width: 200px;
            height: 100px;
            margin: 15px 0;
            padding: 10px;
            background-color: #ddd;
        }

        /* 1 - Sombra simples */
        .s1 {
            box-shadow: 5px 5px 10px gray;
        }

        /* 2 - Sombra suave */
        .s2 {
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.3);
        }

        /* 3 - Sombra forte */
        .s3 {
            box-shadow: 10px 10px 20px black;
        }

        /* 4 - Sombra colorida */
        .s4 {
            box-shadow: 5px 5px 10px red;
        }

        /* 5 - Sombra interna */
        .s5 {
            box-shadow: inset 5px 5px 10px gray;
        }

        /* 6 - Múltiplas sombras */
        .s6 {
            box-shadow: 3px 3px 5px black,
                -3px -3px 5px gray;
        }

        /* 7 - Efeito card */
        .s7 {
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            background-color: white;
        }

        /* 8 - Efeito hover */
        .s8 {
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .s8:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        /* 9 - Glow (brilho) */
        .s9 {
            box-shadow: 0 0 15px blue;
        }

        /* 10 - Neumorphism - aparência 3D "macia" e extrudada, onde os elementos 
        parecem flutuar ou estar moldados no próprio fundo */
        .s10 {
            background-color: #e0e0e0;
            box-shadow: 8px 8px 15px #aaa,
                -8px -8px 15px #fff;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Exemplos de Box Shadow</h1>

        <h2>1. Sombra simples</h2>
        <div class="box s1">Simples</div>

        <h2>2. Sombra suave</h2>
        <div class="box s2">Suave</div>

        <h2>3. Sombra forte</h2>
        <div class="box s3">Forte</div>

        <h2>4. Sombra colorida</h2>
        <div class="box s4">Colorida</div>

        <h2>5. Sombra interna</h2>
        <div class="box s5">Inset</div>

        <h2>6. Múltiplas sombras</h2>
        <div class="box s6">Múltiplas</div>

        <h2>7. Estilo Card</h2>
        <div class="box s7">Card</div>

        <h2>8. Hover interativo</h2>
        <div class="box s8">Passe o mouse</div>

        <h2>9. Glow</h2>
        <div class="box s9">Brilho</div>

        <h2>10. Neumorphism</h2>
        <div class="box s10">Neumorphism</div>

    </div>

</body>

</html>
