<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Comparação Position CSS</title>

<style>
body { font-family: Arial; margin:0; }

header {
    background:#333; color:#fff;
    padding:15px; text-align:center;
}

/* CONTAINER */
.container {
    padding:20px;
}

/* CAIXAS */
.box {
    padding:15px;
    margin:10px 0;
    background:lightblue;
    border:2px solid blue;
}

/* RELATIVE */
.relative {
    position: relative;
    top:10px;
    left:20px;
    background:orange;
}

/* ABSOLUTE */
.pai {
    position: relative;
    height:150px;
    border:2px dashed black;
    margin-top:20px;
}
.absolute {
    position:absolute;
    top:10px;
    right:10px;
    background:red;
    color:#fff;
    padding:10px;
}

/* FIXED */
.fixed {
    position:fixed;
    bottom:20px;
    right:20px;
    background:green;
    color:#fff;
    padding:10px;
}

/* STICKY */
.sticky {
    position:sticky;
    top:0;
    background:black;
    color:#fff;
    padding:10px;
}

</style>
</head>
<body>

<header>Comparação de Position</header>

<div class="sticky">Menu Sticky</div>

<div class="container">

<h2>Static (padrão)</h2>
<div class="box">Elemento normal</div>

<h2>Relative</h2>
<div class="box relative">Movido com relative</div>

<h2>Absolute</h2>
<div class="pai">
    <div class="absolute">Absolute</div>
</div>

<h2>Conteúdo para rolagem</h2>
<div class="box">Conteúdo</div>
<div class="box">Conteúdo</div>
<div class="box">Conteúdo</div>
<div class="box">Conteúdo</div>

</div>

<div class="fixed">Botão Fixed</div>

</body>
</html>
