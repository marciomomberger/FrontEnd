<!DOCTYPE html>
<html>
<head>
    <title>Exemplo Flexbox</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f0f0f0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .container {
            display: flex;

            /* Direção dos itens */
            flex-direction: row;

            /* Alinhamento horizontal */
            justify-content: space-between;

            /* Alinhamento vertical */
            align-items: center;

            /* Permite quebrar linha */
            flex-wrap: wrap;

            gap: 10px;

            background-color: white;
            padding: 20px;
            border-radius: 10px;
        }

        .item {
            width: 120px;
            height: 80px;
            background-color: lightblue;
            border: 1px solid black;

            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Item que cresce */
        .grow {
            flex-grow: 2;
            background-color: lightcoral;
        }

        /* Item com ordem diferente */
        .order {
            order: -1;
            background-color: lightgreen;
        }

    </style>
</head>
<body>

<h1>Exemplo de Flexbox</h1>

<div class="container">
    <div class="item">Item 1</div>
    <div class="item grow">Item 2 (grow)</div>
    <div class="item">Item 3</div>
    <div class="item order">Item 4 (order)</div>
    <div class="item">Item 5</div>
</div>

</body>
</html>
