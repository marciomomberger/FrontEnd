<!DOCTYPE html>
<html>
<head>
    <title>Exemplo CSS Grid</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f0f0f0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .container {
            display: grid;

            /* Define 3 colunas */
            grid-template-columns: 1fr 1fr 1fr;

            /* Define altura das linhas */
            grid-template-rows: 100px 100px;

            /* Espaçamento entre os elementos */
            gap: 10px;

            background-color: white;
            padding: 20px;
            border-radius: 10px;
        }

        .item {
            background-color: lightblue;
            border: 1px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Item ocupando mais colunas */
        .item1 {
            grid-column: 1 / 3; /* ocupa da coluna 1 até 2 */
            background-color: lightcoral;
        }

        /* Item ocupando mais linhas */
        .item2 {
            grid-row: 1 / 3; /* ocupa duas linhas */
            background-color: lightgreen;
        }

    </style>
</head>
<body>

<h1>Exemplo de CSS Grid</h1>

<div class="container">
    <div class="item item1">Item 1 (2 colunas)</div>
    <div class="item item2">Item 2 (2 linhas)</div>
    <div class="item">Item 3</div>
    <div class="item">Item 4</div>
    <div class="item">Item 5</div>
</div>

</body>
</html>
