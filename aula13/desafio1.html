<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Loja de Informática</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            width: 250px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            box-shadow: 8px 8px 20px rgba(0,0,0,0.4);
            transform: scale(1.05);
        }

        .card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #3498db;
            object-fit: cover;
        }

        .card h3 {
            margin: 10px 0;
        }

        .preco {
            color: green;
            font-weight: bold;
            margin: 10px 0;
        }

        button {
            padding: 10px 15px;
            border: none;
            background-color: #3498db;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

<h1>💻 Loja de Informática</h1>

<div class="container">

    <!-- Produto 1 -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8" alt="Notebook">
        <h3>Notebook</h3>
        <p>Notebook i5, 8GB RAM, SSD 256GB.</p>
        <p class="preco">R$ 3.500,00</p>
        <button>Comprar</button>
    </div>

    <!-- Produto 2 -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1587825140708-dfaf72ae4b04" alt="Mouse Gamer">
        <h3>Mouse Gamer</h3>
        <p>Mouse RGB com alta precisão.</p>
        <p class="preco">R$ 150,00</p>
        <button>Comprar</button>
    </div>

    <!-- Produto 3 -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1518770660439-4636190af475" alt="Teclado Mecânico">
        <h3>Teclado Mecânico</h3>
        <p>Teclado com switches azuis e iluminação.</p>
        <p class="preco">R$ 300,00</p>
        <button>Comprar</button>
    </div>

</div>

</body>
</html>
