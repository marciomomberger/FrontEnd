<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Projeto Layout</title>

<style>
body { margin:0; font-family:Arial; }

/* MENU FIXO */
.menu {
    position: fixed;
    top:0;
    width:100%;
    background:#333;
    color:white;
    padding:15px;
    text-align:center;
}

/* BANNER */
.banner {
    margin-top:60px;
    height:200px;
    background:lightblue;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* CARDS */
.container {
    display:flex;
    gap:20px;
    padding:20px;
}

.card {
    position: relative;
    background:#fff;
    padding:20px;
    border:1px solid #ccc;
    width:200px;
}

/* BADGE */
.badge {
    position:absolute;
    top:10px;
    right:10px;
    background:red;
    color:white;
    padding:5px;
}

/* BOTÃO FIXO */
.botao {
    position: fixed;
    bottom:20px;
    right:20px;
    background:green;
    color:white;
    padding:15px;
}

</style>
</head>
<body>

<div class="menu">Menu Fixo</div>

<div class="banner">Banner</div>

<div class="container">

<div class="card">
    <div class="badge">Novo</div>
    Produto 1
</div>

<div class="card">
    <div class="badge">Promo</div>
    Produto 2
</div>

</div>

<div class="botao">Chat</div>

</body>
</html>
