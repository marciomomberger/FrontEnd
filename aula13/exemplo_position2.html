<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layout Responsivo</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* MENU FIXO */
.menu {
    position: fixed;
    top: 0;
    width: 100%;
    background: #333;
    color: white;
    padding: 15px;
    text-align: center;
    z-index: 1000;
}

/* BANNER */
.banner {
    margin-top: 60px;
    height: 200px;
    background: lightblue;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
}

/* CONTAINER FLEX */
.container {
    display: flex;
    gap: 20px;
    padding: 20px;
    justify-content: center;
    flex-wrap: wrap; /* RESPONSIVO */
}

/* CARD */
.card {
    position: relative;
    background: #fff;
    padding: 20px;
    border: 1px solid #ccc;
    width: 250px;
    box-shadow: 3px 3px 10px rgba(0,0,0,0.2);
}

/* BADGE */
.badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: red;
    color: white;
    padding: 5px;
}

/* BOTÃO FIXO */
.botao {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: green;
    color: white;
    padding: 15px;
    border-radius: 50px;
}

/* 📱 MOBILE */
@media (max-width: 768px) {

    .banner {
        height: 150px;
        font-size: 18px;
    }

    .container {
        flex-direction: column;
        align-items: center;
    }

    .card {
        width: 90%;
    }

    .menu {
        font-size: 14px;
        padding: 10px;
    }

    .botao {
        padding: 10px;
    }
}

/* 📱 TELAS MUITO PEQUENAS */
@media (max-width: 480px) {

    .banner {
        height: 120px;
        font-size: 16px;
    }

    .card {
        padding: 15px;
    }

    .botao {
        bottom: 10px;
        right: 10px;
    }
}

</style>
</head>
<body>

<div class="menu">Menu Fixo Responsivo</div>

<div class="banner">Banner Responsivo</div>

<div class="container">

<div class="card">
    <div class="badge">Novo</div>
    Produto 1
</div>

<div class="card">
    <div class="badge">Promo</div>
    Produto 2
</div>

<div class="card">
    <div class="badge">Top</div>
    Produto 3
</div>

</div>

<div class="botao">Chat</div>

</body>
</html>
