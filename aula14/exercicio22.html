<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<style>

.cards{
    display:flex;
    gap:20px;
}

.card{
    width:250px;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.card img{
    width:100%;
}

.card-content{
    padding:15px;
}

</style>

</head>
<body>

<div class="cards">

    <div class="card">
        <img src="https://picsum.photos/300/200?1">

        <div class="card-content">
            <h3>Card 1</h3>
            <p>Descrição do card.</p>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/200?2">

        <div class="card-content">
            <h3>Card 2</h3>
            <p>Descrição do card.</p>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/200?3">

        <div class="card-content">
            <h3>Card 3</h3>
            <p>Descrição do card.</p>
        </div>
    </div>

</div>

</body>
</html>
