<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<style>

.chat{

    position:fixed;

    bottom:20px;
    right:20px;

    background:#8b5cf6;
    color:white;

    padding:20px;

    border-radius:50px;

    border:none;

    cursor:pointer;

    transition:0.3s;
}

.chat:hover{

    background:#6d28d9;

    transform:scale(1.1);

}

</style>

</head>
<body>

<button class="chat">
    💬 Chat
</button>

</body>
</html>
