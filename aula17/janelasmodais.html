<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janelas Modais</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Trabalhando com Modais</h1>
        <button id="abrirModal"> Abrir Modal </button>
    </div>
    <!-- FUNDO ESCURO -->
    <div class="overlay" id="overlay">
        <!-- JANELA MODAL -->
        <div class="modal">
            <h2>Janela Modal</h2>
            <p>
                Esta é uma janela modal criada com HTML,
                CSS e JavaScript.
            </p>
            <button id="fecharModal">Fechar</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
