<!-- index.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema de Produtos</title>
  <link rel="stylesheet" href="stylesys.css">
</head>
<body>
  <!-- MENU -->
  <header class="topo">
    <h1>🛒 Sistema de Produtos</h1>
    <nav>
      <button id="btnAbrirLogin">Login</button>
      <button id="btnAbrirCadastro">Cadastrar Produto</button>
      <button id="btnAbrirLista">Lista de Produtos</button>
    </nav>
  </header>
  <!-- CONTEÚDO -->
  <main class="conteudo">
    <div class="card">
      <h2>Bem-vindo</h2>
      <p>
        Este projeto demonstra:
      </p>
      <ul>
        <li>✅ Login com JavaScript</li>
        <li>✅ Cadastro de produtos</li>
        <li>✅ Modal lateral</li>
        <li>✅ Lista dinâmica de produtos</li>
        <li>✅ Tema claro e escuro</li>
      </ul>
    </div>
  </main>
  <!-- FUNDO ESCURO -->
  <div class="overlay" id="overlay"></div>
  <!-- MODAL LOGIN -->
  <aside class="modal-lateral" id="modalLogin">
    <div class="topo-modal">
      <h2>Login</h2>
      <button class="fechar">&times;</button>
    </div>
    <form id="formLogin">
      <label>Email</label>
      <input type="email" id="emailLogin" required>
      <label>Senha</label>
      <input type="password" id="senhaLogin" required>
      <button type="submit" class="btn-salvar">
        Entrar
      </button>
      <p id="msgLogin"></p>
    </form>
  </aside>
  <!-- MODAL CADASTRO -->
  <aside class="modal-lateral" id="modalCadastro">
    <div class="topo-modal">
      <h2>Cadastro Produto</h2>
      <button class="fechar">&times;</button>
    </div>
    <form id="formProduto">
      <label>Nome do Produto</label>
      <input type="text" id="nomeProduto" required>
      <label>Preço</label>
      <input type="number" id="precoProduto" required>
      <button type="submit" class="btn-salvar">
        Cadastrar
      </button>
    </form>
  </aside>
  <!-- MODAL LISTA -->
  <aside class="modal-lateral" id="modalLista">
    <div class="topo-modal">
      <h2>Lista de Produtos</h2>
      <button class="fechar">&times;</button>
    </div>
    <div id="listaProdutos">
    </div>
  </aside>
  <!-- BOTÃO TEMA -->
  <button id="btnTema">
    🌙
  </button>
  <script src="scriptsys.js"></script>
</body>
</html>
